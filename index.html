<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Pro - Física Aplicada</title>
    <style>
        /* Base y Fondo Frutiger Aero */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, rgba(161, 223, 251, 0.4) 0%, rgba(212, 240, 255, 0.4) 50%, rgba(137, 207, 240, 0.4) 100%), 
                        url('fondo.jpg'); 
            background-size: cover; background-attachment: fixed;
            min-height: 100vh; color: #1a4a5e; display: flex; flex-direction: column; align-items: center; padding: 2rem;
        }

        /* Cristalería (Glassmorphism) */
        header, .submenu-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border-radius: 20px; padding: 2rem; width: 100%; max-width: 900px; text-align: center; margin-bottom: 2rem;
        }

        .personal-info {
            display: inline-block; background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(230,245,255,0.7) 100%);
            padding: 10px 25px; border-radius: 50px; font-weight: bold; color: #023e8a; margin-top: 10px;
        }

        /* Grid de Botones */
        .grid-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; max-width: 1100px;
        }

        .folder-link {
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            transition: all 0.3s ease; width: 150px; cursor: pointer;
        }

        .folder-link:hover { transform: translateY(-10px); }

        .glossy-box {
            width: 110px; height: 110px; border-radius: 25px;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.2) 49%, rgba(255,255,255,0.0) 50%, rgba(255,255,255,0.4) 100%);
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex; justify-content: center; align-items: center; margin-bottom: 0.8rem; position: relative; overflow: hidden;
        }

        .glossy-box img { width: 60%; height: 60%; object-fit: contain; z-index: 1; }

        .folder-name {
            font-size: 0.9rem; font-weight: 600; color: #005682; text-align: center;
            background: rgba(255,255,255,0.5); padding: 5px 12px; border-radius: 12px;
        }

        /* Visor e Interfaz de Navegación */
        #viewer-container, .submenu-section { display: none; width: 100%; flex-direction: column; align-items: center; }

        iframe {
            width: 100%; height: 80vh; border-radius: 15px; border: 4px solid white;
            background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn-nav {
            margin-bottom: 20px; padding: 10px 25px;
            background: linear-gradient(180deg, #4cc9f0 0%, #4361ee 100%);
            color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>Universidad Central del Ecuador</h1>
        <div class="personal-info">Andrés Jumbo | Física Aplicada</div>
    </header>

    <main class="grid-container" id="menu-root">
        <div class="folder-link" onclick="openDoc('URL_SILABO_DIRECTO')">
            <div class="glossy-box"><img src="silabo.jpg"></div>
            <span class="folder-name">Sílabo</span>
        </div>
        <div class="folder-link" onclick="showSubmenu('menu-info')">
            <div class="glossy-box"><img src="personal.png"></div>
            <span class="folder-name">Información Personal</span>
        </div>
        <div class="folder-link" onclick="showSubmenu('menu-tareas-ind')">
            <div class="glossy-box"><img src="tareas.webp"></div>
            <span class="folder-name">Tareas Individuales</span>
        </div>
        <div class="folder-link" onclick="showSubmenu('menu-centro')">
            <div class="glossy-box"><img src="centro.jpg"></div>
            <span class="folder-name">Centro de Física</span>
        </div>
    </main>

    <section class="submenu-section" id="menu-info">
        <button class="btn-nav" onclick="goBack('menu-root')">← Volver</button>
        <div class="grid-container">
            <div class="folder-link" onclick="openDoc('URL_CV')"><div class="glossy-box">📄</div><span class="folder-name">Currículum</span></div>
            <div class="folder-link" onclick="openDoc('URL_MATRICULA')"><div class="glossy-box">📝</div><span class="folder-name">Matrícula</span></div>
            <div class="folder-link" onclick="openDoc('URL_HORARIO')"><div class="glossy-box">📅</div><span class="folder-name">Horario Académico</span></div>
            <div class="folder-link" onclick="openDoc('URL_INGLES')"><div class="glossy-box">🇬🇧</div><span class="folder-name">Horario Inglés</span></div>
        </div>
    </section>

    <section class="submenu-section" id="menu-tareas-ind">
        <button class="btn-nav" onclick="goBack('menu-root')">← Volver</button>
        <div class="grid-container">
            <div class="folder-link" onclick="showSubmenu('menu-u1')"><div class="glossy-box">1️⃣</div><span class="folder-name">Unidad 1</span></div>
            <div class="folder-link" onclick="showSubmenu('menu-u2')"><div class="glossy-box">2️⃣</div><span class="folder-name">Unidad 2</span></div>
        </div>
    </section>

    <section class="submenu-section" id="menu-u1">
        <button class="btn-nav" onclick="goBack('menu-tareas-ind')">← Volver</button>
        <div class="grid-container">
            <div class="folder-link" onclick="openDoc('URL_TAREA1')"><div class="glossy-box">📓</div><span class="folder-name">Tarea 1</span></div>
        </div>
    </section>

    <section class="submenu-section" id="menu-centro">
        <button class="btn-nav" onclick="goBack('menu-root')">← Volver</button>
        <div class="grid-container">
            <div class="folder-link" onclick="showSubmenu('menu-p1')"><div class="glossy-box">🔬</div><span class="folder-name">Práctica 1</span></div>
            <div class="folder-link" onclick="showSubmenu('menu-p2')"><div class="glossy-box">🔬</div><span class="folder-name">Práctica 2</span></div>
        </div>
    </section>

    <section class="submenu-section" id="menu-p1">
        <button class="btn-nav" onclick="goBack('menu-centro')">← Volver</button>
        <div class="grid-container">
            <div class="folder-link" onclick="openDoc('URL_INFORME_P1')"><div class="glossy-box">📘</div><span class="folder-name">Informe</span></div>
            <div class="folder-link" onclick="openDoc('URL_FUNDAMENTO_P1')"><div class="glossy-box">📖</div><span class="folder-name">Fundamento</span></div>
        </div>
    </section>

    <section id="viewer-container">
        <button class="btn-nav" id="btn-cerrar-visor">← Cerrar Documento</button>
        <iframe id="doc-iframe" src=""></iframe>
    </section>

    <script>
        let currentMenuId = 'menu-root';

        function showSubmenu(menuId) {
            document.querySelectorAll('main, .submenu-section, #viewer-container').forEach(el => el.style.display = 'none');
            document.getElementById(menuId).style.display = 'flex';
            currentMenuId = menuId;
        }

        function goBack(targetId) {
            showSubmenu(targetId);
        }

        function openDoc(url) {
            document.querySelectorAll('main, .submenu-section').forEach(el => el.style.display = 'none');
            const viewer = document.getElementById('viewer-container');
            viewer.style.display = 'flex';
            document.getElementById('doc-iframe').src = url;
            
            // Al cerrar el visor, vuelve al submenú donde estabas
            document.getElementById('btn-cerrar-visor').onclick = function() {
                viewer.style.display = 'none';
                document.getElementById(currentMenuId).style.display = 'flex';
            };
        }
    </script>
</body>
</html>
