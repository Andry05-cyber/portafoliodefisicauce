<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Física Aplicada</title>
    <style>
        /* Reset y configuración base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fondo estilo Frutiger Aero (Cielo / Agua) con imagen más visible */
        body {
            /* He bajado la opacidad del gradiente a 0.4 para que se vea mucho más la imagen */
            background: linear-gradient(135deg, rgba(161, 223, 251, 0.4) 0%, rgba(212, 240, 255, 0.4) 50%, rgba(137, 207, 240, 0.4) 100%), 
                        url('fondo.jpg'); /* <-- Se asume que fondo.jpg está en la misma carpeta */
            
            /* Configuraciones para acoplar la imagen a toda la pantalla sin repetirse */
            background-size: cover;          /* Cubre toda la pantalla */
            background-repeat: no-repeat;     /* No se repite */
            background-position: center;     /* Centrada */
            background-attachment: fixed;    /* Fija al hacer scroll */
            
            min-height: 100vh;
            color: #1a4a5e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        /* Encabezado con efecto cristal (Glassmorphism) */
        header {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15), 
                        inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 1.8rem;
            color: #005682;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
            margin-bottom: 0.5rem;
        }

        header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #0077b6;
            margin-bottom: 0.2rem;
        }

        header h3 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #0096c7;
            margin-bottom: 1.5rem;
        }

        .personal-info {
            display: inline-block;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(230,245,255,0.7) 100%);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-weight: bold;
            color: #023e8a;
        }

        .personal-info span {
            margin: 0 10px;
        }

        /* Contenedor de las carpetas/enlaces */
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem;
            max-width: 1000px;
        }

        /* Botones / Enlaces brillantes (Glossy) */
        .folder-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 160px;
        }

        .folder-link:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .glossy-box {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.2) 49%, rgba(255,255,255,0.0) 50%, rgba(255,255,255,0.4) 100%);
            box-shadow: 
                0 10px 20px rgba(0, 119, 182, 0.2),
                inset 0 2px 3px rgba(255, 255, 255, 1),
                inset 0 -2px 5px rgba(0, 119, 182, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* Reflejo superior típico de Frutiger Aero */
        .glossy-box::after {
            content: '';
            position: absolute;
            top: 2%;
            left: 5%;
            width: 90%;
            height: 45%;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.1) 100%);
            border-radius: 20px 20px 100px 100px;
            pointer-events: none;
        }

        /* Imágenes dentro de los botones */
        .glossy-box img {
            width: 65%;
            height: 65%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            z-index: 1;
        }

        .folder-name {
            font-size: 1rem;
            font-weight: 600;
            color: #005682;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.4);
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

    </style>
</head>
<body>

    <header>
        <h1>Universidad Central del Ecuador</h1>
        <h2>Facultad de Filosofía, Letras y Ciencias de la Educación</h2>
        <h3>Pedagogía de las Ciencias Experimentales Informática</h3>
        
        <div class="personal-info">
            <span>Andrés Jumbo</span> | 
            <span>5to Semestre</span> | 
            <span>Física Aplicada</span>
        </div>
    </header>

    <main class="grid-container">
        <a href="https://drive.google.com/drive/folders/1HCCZZDh-3TmtHITPpE0YiHl8eUbq9Pgg?usp=sharing" target="_blank" class="folder-link">
            <div class="glossy-box">
                <img src="silabo.jpg" alt="Icono Sílabo">
            </div>
            <span class="folder-name">Sílabo</span>
        </a>

        <a href="TU_ENLACE_DE_DRIVE_AQUI" target="_blank" class="folder-link">
            <div class="glossy-box">
                <img src="personal.png" alt="Icono Información">
            </div>
            <span class="folder-name">Información Personal</span>
        </a>

        <a href="TU_ENLACE_DE_DRIVE_AQUI" target="_blank" class="folder-link">
            <div class="glossy-box">
                <img src="tareas.webp" alt="Icono Tareas">
            </div>
            <span class="folder-name">Tareas</span>
        </a>

        <a href="TU_ENLACE_DE_DRIVE_AQUI" target="_blank" class="folder-link">
            <div class="glossy-box">
                <img src="grpal.avif" alt="Icono Grupales">
            </div>
            <span class="folder-name">Tareas Grupales</span>
        </a>

        <a href="TU_ENLACE_DE_DRIVE_AQUI" target="_blank" class="folder-link">
            <div class="glossy-box">
                <img src="centro.jpg" alt="Icono Centro Física">
            </div>
            <span class="folder-name">Grupales del Centro de Física</span>
        </a>
    </main>

</body>
</html>
